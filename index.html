<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DISCO掲示板</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .header { background: #5865F2; color: white; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; }
        .admin-panel { background: #fff3cd; padding: 15px; margin-top: 20px; display: none; }
        .post-box, .post { background: white; padding: 15px; margin-top: 20px; border-radius: 8px; }
        button { background: #5865F2; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>DISCO掲示板</h1><button id="loginBtn">Discordでログイン</button></div>
    
    <!-- 管理者専用パネル -->
    <div id="adminPanel" class="admin-panel">
        <h3>管理者パネル</h3>
        <p>管理者ID: 1434872648101396511</p>
        <button onclick="alert('権限付与(デモ)')">権限を付与</button>
    </div>

    <div class="post-box">
        <textarea id="postInput"></textarea>
        <button onclick="addPost()">投稿</button>
    </div>
    <div id="posts"></div>

    <script>
        const ADMIN_ID = "1434872648101396511";
        const params = new URLSearchParams(window.location.search);
        const userData = JSON.parse(params.get('user') || '{}');

        // ログイン状態と管理者の表示処理
        if (userData.id) {
            document.getElementById('loginBtn').innerText = `${userData.username}でログイン中`;
            if (userData.id === ADMIN_ID) document.getElementById('adminPanel').style.display = 'block';
        }
        
        function addPost() {
            const text = document.getElementById('postInput').value;
            if (text) {
                const p = document.createElement('div');
                p.className = 'post';
                p.innerHTML = `<strong>${userData.username || 'ゲスト'}:</strong> ${text}`;
                document.getElementById('posts').prepend(p);
                document.getElementById('postInput').value = '';
            }
        }
    </script>
</body>
</html>
